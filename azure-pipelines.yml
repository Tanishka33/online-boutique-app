trigger:
  branches:
    include:
      - test

pool:
  name: laptop-agent

jobs:

- job: SourceValidation
  steps:
  - checkout: self
  - script: |
      echo "Current Branch:"
      echo $(Build.SourceBranch)

      if [ "$(Build.SourceBranch)" != "refs/heads/test" ]; then
          echo "Wrong branch"
          exit 1
      fi

      echo "Branch validated"
    displayName: 'Validate Branch'

  - script: |
      echo "Checking project files"

      ls

      if [ ! -d "src" ]; then
          echo "src folder missing"
          exit 1
      fi

      echo "Repository validated"
    displayName: 'Validate Repository'