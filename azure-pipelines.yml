trigger:
  branches:
    include:
      - test

pool:
  name: laptop-agent

steps:

- checkout: self

- script: |
    echo "Pipeline started"

    pwd

    ls -la

  displayName: 'Verify Repository'

- script: |
    echo "Checking application structure"

    if [ -d "src" ]; then
      echo "src exists"
    else
      echo "src missing"
      exit 1
    fi

  displayName: 'Validate Project'